version: '3.8'

services:
  # Servicio de Base de Datos
  db:
    image: postgres:15-alpine
    container_name: inventario_db_container
    restart: unless-stopped
    environment:
      - POSTGRES_USER=inventario_user
      - POSTGRES_PASSWORD=mi_password_secreto
      - POSTGRES_DB=inventario_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Servicio del Backend Web (FastAPI)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventario_backend_container
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
          - JWT_SECRET=8f9a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a
          - JWT_ALGORITHM=HS256
    volumes:
      - ./app:/code/app
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
volumes:
  postgres_data: